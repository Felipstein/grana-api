services:
  ministack:
    image: nahuelnucera/ministack:latest
    container_name: grana-ministack
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.docker/ministack:/data/state
    environment:
      PERSIST_STATE: "1"
      STATE_DIR: "/data/state"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4566/')\""]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

  dynamodb-admin:
    image: omarcloud20/dynamodb-admin-arm64
    container_name: dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: "http://ministack:4566"
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
    depends_on:
      ministack:
        condition: service_healthy
    restart: unless-stopped
