org: felipstein
service: grana

provider:
  name: aws
  region: sa-east-1
  runtime: nodejs24.x
  architecture: arm64
  memorySize: 128
  stage: ${opt:stage, 'dev'}
  environment:
    LOCAL_ENDPOINT_URL: ${self:custom.awsEndpoint.${self:provider.stage}, ""}
    MAIN_TABLE_NAME: ${self:custom.resourceNames.MainTable}
  iam:
    role:
      statements:
        - Effect: Allow
          Action: dynamodb:PutItem
          Resource: !GetAtt MainTable.Arn


plugins:
  - serverless-offline

custom:
  resourceNames:
    MainTable: ${self:service}-${self:provider.stage}-table
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002
    noAuth: true
  awsEndpoint:
    local: "http://localhost:4566"
    dev: ""
    prod: ""

package:
  individually: true

build:
  esbuild:
    configFile: ./esbuild.config.mjs

functions:
  hello:
    handler: src/hello.handler
    events:
      - httpApi:
          method: GET
          path: /

resources:
  Resources:
    MainTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.resourceNames.MainTable}
        BillingMode: PAY_PER_REQUEST
        DeletionProtectionEnabled: true
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
          RecoveryPeriodInDays: 35
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
